  <style>
:root {
  --bg-0: #071318;
  --bg-1: #0b1b22;
  --bg-2: #10252d;

}

* { box-sizing: border-box; }
html { min-height: 100%; background: var(--bg-0); }
body {

  margin: 0;
  color: var(--cream);
  background:

    radial-gradient(circle at 20% 100%, rgba(76, 137, 158, .07), transparent 30rem),
    var(--bg-0);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font: inherit; }
button { color: inherit; }
button, [data-act] { -webkit-tap-highlight-color: transparent; }
svg { width: 18px; height: 18px; display: block; }
::selection { color: #171308; background: var(--gold-2); }

.app-shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); }
.sidebar {
  position: fixed;
  inset: 0 auto 0 0;

.brand-title { color: var(--gold-2); letter-spacing: .24em; font-size: 10px; font-weight: 850; }
.brand-subtitle { margin-top: 1px; color: var(--cream); font: 17px/1.2 Georgia, serif; }
.sidebar-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 12px 20px; scrollbar-width: thin; scrollbar-color: rgba(240,206,104,.24) transparent; }
.workspace-switcher {

}
.workspace-avatar, .user-avatar {

  border-radius: 9px;
  background: rgba(212,172,63,.12);

  border: 1px solid rgba(212,172,63,.22);
}
.workspace-copy { min-width: 0; }
.workspace-name, .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 760; }
.workspace-plan, .user-role { color: var(--muted); font-size: 10px; }
.nav-group { margin-top: 13px; }
.nav-label { padding: 0 9px 6px; color: #7f989a; font-size: 9px; font-weight: 850; letter-spacing: .16em; text-transform: uppercase; }
.nav-item {
  width: 100%; border: 0; background: transparent; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; margin: 2px 0;
  border-radius: 10px; color: #b9c4be; text-align: left;
  transition: background .14s ease, color .14s ease, transform .14s ease;
}
.nav-item:hover { color: var(--cream); background: rgba(242,234,217,.045); transform: translateX(1px); }
.nav-item.active {
  color: var(--cream);
  background: linear-gradient(90deg, rgba(212,172,63,.18), rgba(212,172,63,.045));

}
.nav-icon { width: 20px; display: grid; place-items: center; color: var(--gold-2); }
.nav-icon svg { width: 16px; height: 16px; }

.sidebar-footer { padding: 10px 12px 13px; border-top: 1px solid var(--line); }

.main-shell { grid-column: 2; min-width: 0; }
.topbar {
  height: var(--topbar); position: sticky; top: 0; z-index: 20;

.topbar-spacer, .toolbar-spacer { flex: 1; }
.search-trigger {

  border: 1px solid var(--line-strong); border-radius: 9px;

.content { padding: 27px 28px 58px; }

.page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 22px; }

.primary-button, .secondary-button, .ghost-button, .danger-button, .icon-button {
  border: 1px solid transparent; border-radius: 9px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;

}

.ghost-button { background: transparent; border-color: var(--line); color: var(--cream-2); }
.danger-button { background: rgba(239,124,120,.10); border-color: rgba(239,124,120,.30); color: #ffaaa6; }

.grid { display: grid; gap: 13px; }
.grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
.grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
.stack { display: grid; gap: 14px; align-content: start; }
.card {
  background: linear-gradient(180deg, rgba(242,234,217,.052), rgba(242,234,217,.026));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 0 12px 36px rgba(0,0,0,.10);

}

.metric-card { min-height: 123px; padding: 15px 16px; display: flex; flex-direction: column; }
.metric-top { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; }
.metric-icon { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 8px; background: rgba(212,172,63,.09); color: var(--gold-2); }
.metric-icon svg { width: 14px; height: 14px; }

.delta { color: var(--green); }

.section-title-row { display: flex; align-items: center; gap: 14px; margin: 25px 0 11px; }

.hero-card {
  position: relative;
  background:
    radial-gradient(circle at 92% 10%, rgba(212,172,63,.16), transparent 21rem),
    linear-gradient(135deg, rgba(28,66,77,.90), rgba(12,31,38,.96));
}

  content: ""; position: absolute; right: -215px; bottom: -335px;
  width: 520px; height: 520px; border-radius: 50%;
  border: 1px solid rgba(212,172,63,.16);
  box-shadow: 0 0 0 58px rgba(212,172,63,.025), 0 0 0 116px rgba(212,172,63,.018);
  pointer-events: none;
}
.hero-inner { position: relative; z-index: 1; padding: 24px 25px; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 24px; align-items: center; }
.book-kicker { color: var(--gold-2); font-size: 9px; font-weight: 850; letter-spacing: .13em; text-transform: uppercase; }
.book-title { margin: 6px 0 8px; max-width: 950px; font: 500 clamp(29px,4vw,52px)/1 Georgia, serif; }

.hero-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.progress-ring {
  --progress: 0;
  width: 132px; height: 132px; border-radius: 50%;
  display: grid; place-items: center; flex: 0 0 auto;
  background: conic-gradient(var(--gold-2) calc(var(--progress) * 1%), rgba(242,234,217,.10) 0);
  box-shadow: 0 15px 45px rgba(0,0,0,.25);

.progress-ring::before { content: ""; grid-area: 1/1; width: 108px; height: 108px; border-radius: 50%; background: #122831; border: 1px solid var(--line); }
.progress-ring-content { position: relative; grid-area: 1/1; text-align: center; }
.progress-ring-value { font: 500 30px/1 Georgia, serif; }
.progress-ring-label { margin-top: 4px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; }
.dashboard-grid { display: grid; grid-template-columns: minmax(0,1.15fr) minmax(320px,.85fr); gap: 14px; }

.progress-list { display: grid; gap: 13px; }
.progress-item { display: grid; grid-template-columns: 150px minmax(80px,1fr) 40px; gap: 10px; align-items: center; }
.progress-label { color: var(--cream-2); font-size: 11px; }
.progress-track { height: 7px; overflow: hidden; border-radius: 999px; background: rgba(242,234,217,.08); }
.progress-bar { height: 100%; border-radius: inherit; background: linear-gradient(90deg, #ad8120, var(--gold-2)); }
.progress-number { text-align: right; color: var(--muted); font-size: 10px; }
.activity-list, .action-list { display: grid; }
.activity-row, .action-row { display: grid; grid-template-columns: auto minmax(0,1fr) auto; gap: 10px; align-items: start; padding: 10px 0; border-bottom: 1px solid var(--line); }
.activity-row:last-child, .action-row:last-child { border-bottom: 0; }
.activity-icon, .action-index { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 9px; background: rgba(212,172,63,.09); color: var(--gold-2); }
.activity-icon svg { width: 14px; height: 14px; }
.action-index { font-size: 11px; font-weight: 850; }
.activity-title, .action-title { font-weight: 720; }
.activity-meta, .action-meta, .activity-time { color: var(--muted); font-size: 10px; }
.activity-time { white-space: nowrap; }
.score-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
.score-tile { padding: 11px; border-radius: 11px; background: rgba(242,234,217,.035); border: 1px solid var(--line); }
.score-head { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.score-name { text-transform: capitalize; color: var(--cream-2); font-size: 11px; }
.score-value { color: var(--gold-2); font-weight: 800; }

.table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel-soft); }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }

.table-primary { display: flex; align-items: center; gap: 10px; min-width: 240px; }
.table-cover { width: 31px; height: 42px; flex: 0 0 auto; border-radius: 3px; border: 1px solid rgba(212,172,63,.28); background: linear-gradient(145deg,#21414b,#0f252d); box-shadow: inset 0 0 0 3px rgba(212,172,63,.04); }

.mini-progress { min-width: 130px; display: grid; grid-template-columns: minmax(70px,1fr) auto; align-items: center; gap: 8px; }
.mini-progress .progress-track { height: 5px; }
.mini-progress span { color: var(--muted); font-size: 10px; }
.tag { display: inline-flex; align-items: center; min-height: 23px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--line-strong); background: rgba(242,234,217,.045); color: var(--cream-2); font-size: 10px; }
.status-badge, .severity-badge { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 8px; font-size: 10px; border: 1px solid var(--line-strong); background: rgba(242,234,217,.045); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }

.status-badge.working, .status-badge.in-progress, .status-badge.in-review, .status-badge.review, .status-badge.assigned, .status-badge.revision { color: #f2ce79; border-color: rgba(233,174,82,.25); background: rgba(233,174,82,.07); }
.status-badge.working .status-dot, .status-badge.in-progress .status-dot, .status-badge.in-review .status-dot, .status-badge.review .status-dot, .status-badge.assigned .status-dot, .status-badge.revision .status-dot { background: var(--orange); }

.book-tabs { display: flex; gap: 4px; margin-bottom: 15px; border-bottom: 1px solid var(--line); overflow-x: auto; }
.tab-button { border: 0; border-bottom: 2px solid transparent; background: transparent; color: var(--muted); cursor: pointer; padding: 10px 12px; white-space: nowrap; }
.tab-button:hover { color: var(--cream); }
.tab-button.active { color: var(--cream); border-bottom-color: var(--gold-2); }
.book-layout { display: grid; grid-template-columns: minmax(0,1.35fr) minmax(270px,.65fr); gap: 14px; }
.definition-list { display: grid; }
.definition-row { display: grid; grid-template-columns: 150px minmax(0,1fr); gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.definition-row:last-child { border-bottom: 0; }
.definition-term { color: var(--muted); font-size: 11px; }
.definition-value { color: var(--cream-2); }
.field-grid, .form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
.field-group { display: grid; gap: 6px; }
.field-group.full { grid-column: 1 / -1; }
.field-label { color: var(--muted); font-size: 10px; font-weight: 750; }
.input, .textarea, .select {
  width: 100%; border: 1px solid var(--line-strong); border-radius: 9px;
  background: rgba(242,234,217,.05); color: var(--cream);
  padding: 10px 11px; outline: none; transition: border-color .13s ease, box-shadow .13s ease;
}
.input:focus, .textarea:focus, .select:focus { border-color: rgba(240,206,104,.65); box-shadow: 0 0 0 3px rgba(212,172,63,.09); }
.textarea { min-height: 94px; resize: vertical; }
.select option { background: var(--bg-2); color: var(--cream); }

.lifecycle-shell { display: grid; grid-template-columns: minmax(280px,.75fr) minmax(0,1.25fr); gap: 14px; align-items: start; }
.milestone-list { max-height: calc(100vh - 220px); overflow-y: auto; padding: 7px; }
.milestone-item { width: 100%; border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--cream-2); cursor: pointer; display: grid; grid-template-columns: 44px minmax(0,1fr) 22px; gap: 9px; align-items: center; padding: 10px; text-align: left; }
.milestone-item:hover { background: rgba(242,234,217,.035); }
.milestone-item.active { background: rgba(212,172,63,.08); border-color: rgba(212,172,63,.25); }
.milestone-code { color: var(--gold-2); font-weight: 850; font-size: 10px; }

.checklist { display: grid; gap: 4px; }

.check-toggle { width: 23px; height: 23px; border-radius: 7px; border: 1px solid var(--line-strong); background: rgba(242,234,217,.035); color: transparent; cursor: pointer; }

function aiReply(q) {
  const p = q.toLowerCase(),
    s = score(),
    openIssues = rows("issues").filter((x) => x.status !== "Resolved"),
    crit = openIssues.find((x) => x.severity === "Critical");
  if (p.includes("next"))
    return `<strong>Next best move:</strong> ${esc(current().items.find((x) => !x.done)?.title || "Advance the gate.")} Then resolve the highest-severity editorial issue.`;
  if (p.includes("risk"))
    return `<strong>Highest risk:</strong> ${esc(crit?.title || openIssues[0]?.title || "No critical risk.")}. ${esc(crit?.description || "")}`;
  if (p.includes("continuity"))
    return `<strong>Continuity summary:</strong><ul>${openIssues
      .filter((x) => ["Continuity", "World"].includes(x.category))
      .map((x) => `<li>${esc(x.title)} — ${x.severity}</li>`)
      .join("")}</ul>`;
  return `<strong>Executive brief:</strong><ul><li>Current gate: ${current().code}</li><li>Readiness: creative ${s.creative}, editorial ${s.editorial}, production ${s.production}, marketing ${s.marketing}</li><li>Open issues: ${openIssues.length}</li></ul>`;
}

    state.characters.push({
      id: "CHAR-" + String(state.characters.length + 1).padStart(6, "0"),
      bookId: book().id,
      name: d.name || "Untitled Character",
      role: d.role || "Supporting",
      status: "Draft",
      summary: d.summary || "",
      wound: d.wound || "",
      desire: d.desire || "",
      fear: d.fear || "",
      arc: d.arc || "",
      scenes: 0,
      links: 0,
      importance: 50,
    });
  else if (id === "f-chapter")
    state.chapters.push({
      id: "CH-" + String(state.chapters.length + 1).padStart(6, "0"),
      bookId: book().id,
      n: Number(d.n) || rows("chapters").length + 1,
      title: d.title || "Untitled Chapter",
      purpose: d.purpose || "",
      pov: d.pov || "",
      goal: Number(d.goal) || 0,
      words: 0,
      status: "Planned",
      emotion: d.emotion || "",
    });
  else if (id === "f-issue")
    state.issues.push({
      id: "ISSUE-" + String(state.issues.length + 1).padStart(6, "0"),
      bookId: book().id,
      title: d.title || "Untitled Issue",
      category: d.category,
      severity: d.severity,
      status: d.status,
      assignee: d.assignee,
      description: d.description,
      created: now(),
    });
  else if (id === "f-asset")
    state.assets.push({
      id: "ASSET-" + String(state.assets.length + 1).padStart(6, "0"),
      bookId: book().id,
      name: d.name || "Untitled Asset",
      type: d.type,
      format: d.format,
      status: d.status,
      version: d.version,
      updated: now(),
    });
  else if (id === "f-campaign")
    state.campaigns.push({
      id: "CMP-" + String(state.campaigns.length + 1).padStart(6, "0"),
      bookId: book().id,
      name: d.name || "Untitled Campaign",
      channel: d.channel,
      objective: d.objective,
      budget: Number(d.budget) || 0,
      status: d.status,
      progress: 0,
    });
  save();
  close();
  location.hash = ui.view;
  render();
  toast("Record created", "Shared Book OS state updated.");
}
function report() {
  open(
    "Lifecycle readiness report",
    book().id + " · M0–M20",
    `<div class="definition-list">${rows("milestones")
      .map(
        (m) =>
          `<div class="definition-row"><div class="definition-term">${m.code}</div><div class="definition-value">${M.find((x) => x[0] === m.code)[1]} · ${mprog(m)}% · ${m.status}</div></div>`,
      )
      .join("")}</div>`,
    `<button class="primary-button" data-act="close">Done</button>`,
    "large",
  );
}
function preflight() {
  const need = [
      "Master Manuscript",
      "Cover Creative Brief",
      "Print Interior",
      "EPUB Master",
      "Metadata Master",
      "Accessibility Report",
    ],
    names = rows("assets").map((x) => x.name.toLowerCase()),
    missing = need.filter(
      (x) =>
        !names.some((n) => n.includes(x.toLowerCase().replace(" master", ""))),
    );
  open(
    "Production package validation",
    book().id + " · M13 preflight",
    `<div class="definition-list"><div class="definition-row"><div class="definition-term">Registered</div><div class="definition-value">${rows("assets").length} assets</div></div><div class="definition-row"><div class="definition-term">Missing</div><div class="definition-value">${missing.map((x) => "• " + esc(x)).join("<br>")}</div></div><div class="definition-row"><div class="definition-term">Launch gate</div><div class="definition-value">${missing.length ? "Blocked" : "Eligible for review"}</div></div></div>`,
    `<button class="primary-button" data-act="close">Done</button>`,
  );
}
function command() {
  open(
    "Search & commands",
    "Jump to any core surface.",
    `<div class="agent-cards">${nav
      .flatMap((g) => g[1])
      .map(
        (x) =>
          `<div class="agent-card" data-act="nav" data-view="${x[0]}"><div class="agent-icon">${x[2]}</div><div><div class="agent-card-name">${x[1]}</div><div class="agent-card-role">Open view</div></div></div>`,
      )
      .join("")}</div>`,
    "",
    "small",
  );
}
function settings() {
  open(
    "Prototype settings",
    "Data is stored locally in this browser.",
    `<div class="agent-cards"><div class="agent-card" data-act="export"><div class="agent-icon">${I.file}</div><div><div class="agent-card-name">Export complete state</div><div class="agent-card-role">Download a JSON snapshot</div></div></div><div class="agent-card" data-act="reset"><div class="agent-icon">${I.alert}</div><div><div class="agent-card-name">Reset demo data</div><div class="agent-card-role">Restore the seeded portfolio</div></div></div></div>`,
    "",
    "small",
  );
}
document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const a = el.dataset.act;
  if (a === "back" && e.target !== el) return;
  if (a === "nav") {
    ui.view = el.dataset.view;
    location.hash = ui.view;
    close();
    render();
  } else if (a === "menu") $("#sidebar").classList.toggle("open");
  else if (a === "create") createMenu();
  else if (a === "new-book") {
    close();
    setTimeout(newBook);
  } else if (a === "new-char") {
    close();
    setTimeout(newChar);
  } else if (a === "new-chapter") {
    close();
    setTimeout(newChapter);
  } else if (a === "new-issue") {
    close();
    setTimeout(newIssue);
  } else if (a === "new-asset") {
    close();
    setTimeout(newAsset);
  } else if (a === "new-campaign") {
    close();
    setTimeout(newCampaign);
  } else if (a === "close" || a === "back") close();
  else if (a === "submit") submit(el.dataset.form);
  else if (a === "tab") {
    ui.tab = el.dataset.tab;
    render();
  } else if (a === "open-book") {
    state.activeBookId = el.dataset.id;
    save();
    ui.view = "book";
    ui.tab = "overview";
    location.hash = "book";
    render();
  } else if (a === "milestone") {
    ui.milestone = el.dataset.code;
    render();
  } else if (a === "item") {
    const m = ms(el.dataset.code),
      i = m.items.find((x) => x.id === el.dataset.id);
    i.done = !i.done;
    m.status = mprog(m) === 100 ? "Review" : "In Progress";
    save();
    render();
  } else if (a === "approve") {
    const m = ms(ui.milestone);
    if (mprog(m) === 100) {
      m.status = "Complete";
      book().milestone = current().code;
      save();
      toast(m.code + " approved", "Lifecycle advanced.");
      render();
    }
  } else if (a === "brief") brief();
  else if (a === "char") details("char", el.dataset.id);
  else if (a === "chapter") details("chapter", el.dataset.id);
  else if (a === "issue") details("issue", el.dataset.id);
  else if (a === "asset") details("asset", el.dataset.id);
  else if (a === "delete") {
    if (confirm("Delete " + el.dataset.id + "?")) {
      state[el.dataset.kind] = state[el.dataset.kind].filter(
        (x) => x.id !== el.dataset.id,
      );
      save();
      close();
      render();
    }
  } else if (a === "send") send();
  else if (a === "ask") send(el.dataset.q);
  else if (a === "exec") send("Give me an executive brief.");
  else if (a === "export") exportState();
  else if (a === "save") {
    save();
    toast("Book Genome saved", "Local state updated.");
  } else if (a === "report") report();
  else if (a === "gate") {
    const m = ms(ui.milestone),
      openItems = m.items.filter((x) => !x.done);
    open(
      "Readiness check",
      m.code + " · " + mprog(m) + "% ready",
      openItems.length
        ? `<div class="risk-list">${openItems.map((x) => `<div class="risk-row"><div class="risk-dot high"></div><div><div class="risk-title">${esc(x.title)}</div><div class="risk-meta">Required exit criterion</div></div></div>`).join("")}</div>`
        : '<div class="empty-state"><h3>Gate is ready</h3><p>All exit criteria are verified.</p></div>',
      `<button class="primary-button" data-act="close">Done</button>`,
    );
  } else if (a === "continuity") send("Run a continuity summary.");
  else if (a === "preflight") preflight();
  else if (a === "outline-packet")
    open(
      "Generated Outline Packet",
      book().id + " · " + rows("chapters").length + " chapters",
      `<div class="timeline">${rows("chapters")
        .map(
          (x) =>
            `<div class="timeline-row"><div class="timeline-node"></div><div><div class="timeline-title">Chapter ${x.n} · ${esc(x.title)}</div><div class="timeline-meta">${esc(x.pov)} · ${x.goal} words · ${esc(x.emotion)}</div></div></div>`,
        )
        .join("")}</div>`,
      `<button class="primary-button" data-act="close">Done</button>`,
      "large",
    );
  else if (a === "print") window.print();
  else if (a === "command") command();
  else if (a === "settings") settings();
  else if (a === "reset") {
    if (confirm("Reset all local data?")) {
      state = seed();
      save();
      close();
      render();
    }
  } else if (a === "toast") $("#" + el.dataset.id)?.remove();
});
document.addEventListener("change", (e) => {
  const t = e.target;
  if (t.dataset.book) {
    let v = t.value;
    if (["goal", "words"].includes(t.dataset.book)) v = Number(v) || 0;
    book()[t.dataset.book] = v;
    book().updated = now();
    save();
    toast("Autosaved", t.dataset.book);
  }
  if (t.dataset.issue) {
    const r = state.issues.find((x) => x.id === t.dataset.issue);
    r.status = t.value;
    save();
    close();
    render();
    toast("Issue updated", r.id + " → " + r.status);
  }
});
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    command();
  }
  if (e.key === "Escape") close();
  if (e.key === "Enter" && e.target.id === "prompt" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
window.addEventListener("hashchange", () => {
  ui.view = location.hash.slice(1) || "dashboard";
  render();
});
if ("serviceWorker" in navigator && location.protocol.startsWith("http"))
  navigator.serviceWorker.register("service-worker.js").catch(() => {});
render();

</script>
</body>
</html>
