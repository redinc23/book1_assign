.milestone-footer { display: flex; align-items: center; gap: 8px; margin-top: 16px; padding-top: 15px; border-top: 1px solid var(--line); }

.entity-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 13px; }
.entity-card { padding: 15px; border-radius: 14px; border: 1px solid var(--line); background: linear-gradient(180deg,rgba(242,234,217,.05),rgba(242,234,217,.025)); cursor: pointer; transition: transform .13s ease, border-color .13s ease; }
.entity-card:hover { transform: translateY(-2px); border-color: rgba(212,172,63,.28); }
.entity-card-top { display: flex; align-items: center; gap: 10px; }
.entity-avatar { width: 39px; height: 39px; display: grid; place-items: center; border-radius: 11px; background: rgba(212,172,63,.11); border: 1px solid rgba(212,172,63,.24); color: var(--gold-2); font-weight: 850; }
.entity-copy { min-width: 0; flex: 1; }
.entity-name { font-weight: 790; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entity-role { color: var(--muted); font-size: 10px; }
.entity-summary { min-height: 62px; margin: 13px 0; color: var(--cream-2); font-size: 12px; }
.entity-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.entity-stat { padding: 8px; border-radius: 9px; background: rgba(242,234,217,.035); text-align: center; }
.entity-stat strong { display: block; color: var(--gold-2); font: 500 19px/1 Georgia, serif; }
.entity-stat span { color: var(--muted); font-size: 9px; }

.kanban { display: grid; grid-template-columns: repeat(4,minmax(240px,1fr)); gap: 12px; overflow-x: auto; align-items: start; }
.kanban-column { min-width: 240px; border: 1px solid var(--line); border-radius: 14px; background: rgba(242,234,217,.025); }
.kanban-header { display: flex; align-items: center; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
.kanban-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); }
.kanban-title { font-weight: 760; }
.kanban-count { margin-left: auto; color: var(--muted); font-size: 10px; }
.kanban-body { padding: 9px; display: grid; gap: 8px; }
.kanban-card { padding: 11px; border: 1px solid var(--line); border-radius: 11px; background: rgba(242,234,217,.045); cursor: pointer; }
.kanban-card:hover { border-color: rgba(212,172,63,.25); }
.kanban-card-title { color: var(--cream); font-weight: 720; }
.kanban-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
.kanban-card-footer { margin-top: 9px; color: var(--muted); font-size: 9px; }

.asset-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 13px; }
.asset-card { display: grid; grid-template-columns: 82px minmax(0,1fr); min-height: 122px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: rgba(242,234,217,.035); cursor: pointer; }
.asset-card:hover { border-color: rgba(212,172,63,.27); }
.asset-preview { display: grid; place-items: center; background: linear-gradient(145deg,rgba(212,172,63,.10),rgba(38,83,95,.22)); color: var(--gold-2); border-right: 1px solid var(--line); }
.asset-preview svg { width: 25px; height: 25px; }
.asset-body { padding: 13px; display: flex; flex-direction: column; }
.asset-name { font-weight: 760; }
.asset-meta { margin-top: 4px; color: var(--muted); font-size: 10px; }
.asset-footer { margin-top: auto; display: flex; justify-content: space-between; gap: 8px; align-items: center; }

.agent-shell { display: grid; grid-template-columns: minmax(0,1.35fr) minmax(280px,.65fr); gap: 14px; align-items: start; }
.agent-chat { display: flex; flex-direction: column; min-height: 650px; }
.agent-header { display: flex; align-items: center; gap: 11px; padding: 15px 17px; border-bottom: 1px solid var(--line); }
.agent-orb { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; background: rgba(212,172,63,.11); color: var(--gold-2); border: 1px solid rgba(212,172,63,.24); }
.agent-name { font-weight: 800; }
.agent-state { color: var(--green); font-size: 10px; }
.chat-messages { flex: 1; min-height: 390px; max-height: 510px; overflow-y: auto; padding: 18px; display: grid; align-content: start; gap: 13px; }
.chat-message { max-width: 83%; }
.chat-message.user { margin-left: auto; }
.chat-author { margin-bottom: 4px; color: var(--muted); font-size: 9px; }
.chat-message.user .chat-author { text-align: right; }
.chat-bubble { padding: 11px 13px; border-radius: 12px 12px 12px 3px; background: rgba(242,234,217,.055); border: 1px solid var(--line); color: var(--cream-2); }
.chat-message.user .chat-bubble { border-radius: 12px 12px 3px 12px; background: rgba(212,172,63,.11); border-color: rgba(212,172,63,.23); color: var(--cream); }
.chat-input-wrap { padding: 13px 15px 15px; border-top: 1px solid var(--line); }
.chat-input { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: end; }
.chat-input textarea { min-height: 66px; max-height: 150px; resize: vertical; border: 1px solid var(--line-strong); border-radius: 10px; background: rgba(242,234,217,.045); color: var(--cream); padding: 10px; outline: none; }
.prompt-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.prompt-chip { border: 1px solid var(--line); border-radius: 999px; background: transparent; color: var(--muted); cursor: pointer; padding: 5px 8px; font-size: 9px; }
.prompt-chip:hover { color: var(--cream); border-color: var(--line-strong); }
.agent-cards { display: grid; gap: 8px; }
.agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: rgba(242,234,217,.03); cursor: pointer; }
.agent-icon { width: 31px; height: 31px; display: grid; place-items: center; border-radius: 8px; color: var(--gold-2); background: rgba(212,172,63,.08); }
.agent-icon svg { width: 15px; height: 15px; }
.agent-card-name { font-weight: 720; }
.agent-card-role { color: var(--muted); font-size: 9px; }
.agent-card-status { margin-left: auto; width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(104,213,157,.08); }

.timeline { display: grid; }
.timeline-row { position: relative; display: grid; grid-template-columns: 23px minmax(0,1fr); gap: 10px; padding: 0 0 19px; }
.timeline-row:not(:last-child)::before { content: ""; position: absolute; left: 6px; top: 13px; bottom: -2px; width: 1px; background: var(--line-strong); }
.timeline-node { width: 13px; height: 13px; margin-top: 3px; border-radius: 50%; background: var(--gold); border: 3px solid #172e36; box-shadow: 0 0 0 1px rgba(212,172,63,.35); z-index: 1; }
.timeline-title { font-weight: 720; }
.timeline-meta { margin-top: 2px; color: var(--muted); font-size: 10px; }

.modal-backdrop { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 18px; background: rgba(3,10,13,.75); backdrop-filter: blur(8px); }
.modal { width: min(720px,100%); max-height: min(860px,92vh); display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--line-strong); border-radius: 18px; background: #10242c; box-shadow: var(--shadow); }
.modal.small { width: min(520px,100%); }
.modal.large { width: min(980px,100%); }
.modal-header, .modal-footer { display: flex; align-items: center; gap: 12px; padding: 16px 18px; }
.modal-header { justify-content: space-between; border-bottom: 1px solid var(--line); }
.modal-footer { justify-content: flex-end; border-top: 1px solid var(--line); }
.modal-title { font: 500 23px/1.1 Georgia, serif; }
.modal-subtitle { margin-top: 3px; color: var(--muted); font-size: 11px; }
.modal-body { padding: 17px 18px; overflow-y: auto; }
.empty-state { padding: 32px; text-align: center; color: var(--muted); }
.empty-state h3 { margin: 0 0 5px; color: var(--cream); }
.empty-state p { margin: 0; }
.risk-list { display: grid; gap: 9px; }
.risk-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: rgba(242,234,217,.03); }
.risk-dot { width: 8px; height: 8px; margin-top: 5px; border-radius: 50%; background: var(--muted); }
.risk-dot.high { background: var(--red); }
.risk-title { font-weight: 720; }
.risk-meta { color: var(--muted); font-size: 10px; }

.toast-root { position: fixed; right: 18px; bottom: 18px; z-index: 140; display: grid; gap: 8px; }
.toast { width: min(380px,calc(100vw - 36px)); display: grid; grid-template-columns: auto minmax(0,1fr) auto; gap: 10px; align-items: start; padding: 12px; border: 1px solid var(--line-strong); border-radius: 12px; background: #18323b; box-shadow: 0 14px 45px rgba(0,0,0,.35); animation: toastIn .18s ease; }
.toast-icon { width: 29px; height: 29px; display: grid; place-items: center; border-radius: 8px; background: rgba(104,213,157,.10); color: var(--green); }
.toast-icon svg { width: 15px; height: 15px; }
.toast-title { font-weight: 780; }
.toast-message { color: var(--muted); font-size: 10px; }
.toast-close { border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; }
@keyframes toastIn { from { transform: translateY(7px); opacity: 0; } }

@media (max-width: 1180px) {
  .grid-4 { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .entity-grid, .asset-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .dashboard-grid, .agent-shell { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  :root { --sidebar: 260px; }
  .app-shell { display: block; }
  .sidebar { transform: translateX(-102%); transition: transform .18s ease; box-shadow: 22px 0 60px rgba(0,0,0,.42); }
  .sidebar.open { transform: translateX(0); }
  .main-shell { grid-column: 1; }
  .mobile-menu { display: inline-flex !important; }
  .topbar { padding-inline: 14px; }
  .content { padding: 22px 16px 50px; }
  .search-trigger { min-width: 36px; width: 36px; padding: 0; justify-content: center; }
  .search-trigger span, .search-trigger kbd { display: none; }
  .lifecycle-shell, .book-layout { grid-template-columns: 1fr; }
  .milestone-list { max-height: 420px; }
  .kanban { grid-template-columns: repeat(4, minmax(250px,1fr)); }
}
@media (max-width: 650px) {
  .page-header { align-items: flex-start; flex-direction: column; }
  .page-actions { width: 100%; justify-content: flex-start; }
  .grid-3, .grid-4, .entity-grid, .asset-grid { grid-template-columns: 1fr; }
  .hero-inner { grid-template-columns: 1fr; }
  .progress-ring { width: 105px; height: 105px; }
  .progress-ring::before { width: 84px; height: 84px; }
  .progress-ring-value { font-size: 24px; }
  .progress-item { grid-template-columns: 115px minmax(60px,1fr) 36px; }
  .score-grid { grid-template-columns: 1fr; }
  .field-grid, .form-grid { grid-template-columns: 1fr; }
  .field-group.full { grid-column: auto; }
  .definition-row { grid-template-columns: 1fr; gap: 2px; }
  .hide-mobile { display: none; }
  .breadcrumbs strong { max-width: 170px; }
  .modal-backdrop { padding: 8px; align-items: end; }
  .modal { width: 100%; max-height: 94vh; border-radius: 18px 18px 0 0; }
}

@media print {
  body { background: #fff; color: #111; }
  .sidebar, .topbar, .page-actions, .hero-actions, button { display: none !important; }
  .app-shell { display: block; }
  .main-shell { grid-column: 1; }
  .content { padding: 0; }
  .card, .table-wrap { color: #111; background: #fff; border-color: #ccc; box-shadow: none; }
  .page-title, .book-title, .card-title, .table-name { color: #111; }
  .page-subtitle, .book-summary, .table-sub, .card-subtitle, .definition-term, .definition-value { color: #444; }
}

/* MANGU Book OS v0.2 — Kernel Build additions */

.kernel-light {

.nav-count {

  border-radius: 999px;

  place-items: center;
  padding: 0 4px;

.action-button,
.risk-button,

.action-button:hover,

.priority-pill {

.kernel-dashboard { margin-top: 14px; }

.kanban-dot.now { background: var(--red); }

.column-empty { padding: 22px 8px; text-align: center; color: #748c8e; font-size: 10px; }
.proposal-list { display: grid; gap: 10px; }
.proposal-card {
  padding: 12px;

}

.proposal-agent { display: flex; align-items: center; gap: 7px; color: var(--gold-2); font-size: 9px; font-weight: 800; }
.proposal-agent svg { width: 14px; height: 14px; }

.proposal-title { margin-top: 9px; color: var(--cream); font-weight: 780; }

.studio-page { width: min(1780px,100%); }
.studio-shell {

  grid-template-columns: 260px minmax(480px,1fr) 320px;

.studio-panel-head {

function v2Clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function v2Hydrate() {
  state.schemaVersion = V2_VERSION;
  for (const [key, value] of Object.entries(V2_SEED)) {
    if (!Array.isArray(state[key])) state[key] = v2Clone(value);
  }
  if (!Array.isArray(state.revisions)) state.revisions = [];
  if (!Array.isArray(state.snapshots)) state.snapshots = [];
  if (!Array.isArray(state.comments)) state.comments = [];
  state.books.forEach((publication) => {
    const existing = (state.milestones || []).filter((milestone) => milestone.bookId === publication.id);
    if (!existing.length) {
      const currentIndex = Math.max(0, M.findIndex((milestone) => milestone[0] === publication.milestone));
      M.forEach((definition, index) => {
        const milestone = deliver(definition[0]);
        milestone.bookId = publication.id;
        milestone.status = index < currentIndex ? "Complete" : index === currentIndex ? "In Progress" : "Planned";
        milestone.items.forEach((item, itemIndex) => {
          item.done = index < currentIndex || (index === currentIndex && itemIndex < 2);
        });
        state.milestones.push(milestone);
      });
    }
  });
  state.chapters.forEach((chapter) => {
    if (typeof chapter.draft !== "string") chapter.draft = V2_DRAFTS[chapter.id] || "";
    chapter.draftWordCount = v2WordCount(chapter.draft);
    chapter.words = Number(chapter.words || chapter.draftWordCount || 0);
    chapter.draftMode = chapter.draftMode || (chapter.words > chapter.draftWordCount ? "excerpt" : "full");
    chapter.version = Number(chapter.version || 1);
    chapter.approval = chapter.approval || "Working";
    chapter.updated = chapter.updated || now();
  });
  const collections = ["books", "characters", "issues", "assets", "campaigns", "scenes", "locations", "canonFacts", "timelineEvents", "relationships", "tasks", "proposals"];
  collections.forEach((key) => (state[key] || []).forEach((record) => {
    record.created = record.created || now();
    record.updated = record.updated || record.created;
    record.version = Number(record.version || 1);
    record.approval = record.approval || (record.status === "Approved" ? "Approved" : "Working");
  }));
  v2RecalculateWords();
  save();
}

function v2WordCount(text) {
  const clean = String(text || "").trim();
  return clean ? clean.split(/\s+/).length : 0;
}

function v2RecalculateWords() {
  state.books.forEach((b) => {
    const total = (state.chapters || []).filter((c) => c.bookId === b.id).reduce((sum, c) => sum + Number(c.words || 0), 0);
    if (total > 0) b.words = Math.max(Number(b.words || 0), total);
  });
}

function v2NextId(prefix, collection) {
  const max = (state[collection] || []).reduce((n, r) => {
    const found = Number(String(r.id || "").match(/(\d+)$/)?.[1] || 0);
    return Math.max(n, found);
  }, 0);
  return `${prefix}-${String(max + 1).padStart(6, "0")}`;
}

function v2Emit(type, title, meta = "", refId = "") {
  state.events.unshift({
    id: "EVT-" + Date.now() + Math.random().toString(16).slice(2, 6),
    bookId: book().id,
    type,
    title,
    meta: meta || `Mangu Studio${refId ? " · " + refId : ""}`,
    refId,
    at: now(),
  });
  state.events = state.events.slice(0, 150);
}

function v2Find(id) {
  const map = {
    BOOK: ["books", "book"], CHAR: ["characters", "char"], CH: ["chapters", "chapter"], SCN: ["scenes", "scene"],
    LOC: ["locations", "location"], CANON: ["canonFacts", "canon"], TML: ["timelineEvents", "timeline"], REL: ["relationships", "relationship"],
    ISSUE: ["issues", "issue"], ASSET: ["assets", "asset"], CMP: ["campaigns", "campaign"], TASK: ["tasks", "task"], PROP: ["proposals", "proposal"],
  };
  const prefix = String(id || "").split("-")[0];
  const config = map[prefix];
  if (!config) return null;
  const record = (state[config[0]] || []).find((x) => x.id === id);
  return record ? { collection: config[0], kind: config[1], record } : null;
}

function v2ReferenceIds(record) {
  const ids = [];
  Object.values(record || {}).forEach((value) => {
    if (typeof value === "string" && /^[A-Z]+-\d+/.test(value)) ids.push(value);
    if (Array.isArray(value)) value.forEach((item) => {
      if (typeof item === "string" && /^[A-Z]+-\d+/.test(item)) ids.push(item);
    });
  });
  return [...new Set(ids)];
}

function v2Impact(id) {
  const collections = ["chapters", "scenes", "characters", "locations", "canonFacts", "timelineEvents", "relationships", "issues", "assets", "campaigns", "tasks", "proposals"];
  const impact = [];
  collections.forEach((collection) => {
    (state[collection] || []).forEach((record) => {
      if (record.bookId !== book().id || record.id === id) return;
      const values = Object.values(record);
      const linked = values.some((value) => value === id || (Array.isArray(value) && value.includes(id)));
      if (linked) impact.push({ collection, record });
    });
  });
  return impact;
}

function v2Integrity() {
  const findings = [];
  const chapterIds = new Set(rows("chapters").map((x) => x.id));
  const charIds = new Set(rows("characters").map((x) => x.id));
  const locationIds = new Set(rows("locations").map((x) => x.id));
  rows("scenes").forEach((scene) => {
    if (!chapterIds.has(scene.chapterId)) findings.push({ severity: "Critical", title: `${scene.id} has no valid chapter`, refId: scene.id });
    if (scene.povId && !charIds.has(scene.povId)) findings.push({ severity: "High", title: `${scene.id} has an invalid POV character`, refId: scene.id });
    if (scene.locationId && !locationIds.has(scene.locationId)) findings.push({ severity: "High", title: `${scene.id} has an invalid location`, refId: scene.id });
  });
  rows("chapters").forEach((chapter) => {
    if (!rows("scenes").some((scene) => scene.chapterId === chapter.id)) findings.push({ severity: "Medium", title: `${chapter.title} has no scene records`, refId: chapter.id });
    if (!chapter.purpose) findings.push({ severity: "Medium", title: `${chapter.title} has no defined purpose`, refId: chapter.id });
  });
  rows("relationships").forEach((relationship) => {
    if (!charIds.has(relationship.sourceId) || !charIds.has(relationship.targetId)) findings.push({ severity: "High", title: `${relationship.id} references a missing character`, refId: relationship.id });
  });
  rows("canonFacts").filter((fact) => fact.status === "Review").forEach((fact) => findings.push({ severity: "High", title: `Canonical rule awaiting decision: ${fact.title}`, refId: fact.id }));
  rows("issues").filter((issue) => issue.status !== "Resolved" && issue.severity === "Critical").forEach((issue) => findings.push({ severity: "Critical", title: issue.title, refId: issue.id }));
  const order = rows("timelineEvents").map((event) => Number(event.order));
  if (new Set(order).size !== order.length) findings.push({ severity: "Medium", title: "Timeline contains duplicate sequence positions", refId: "timeline" });
  return findings;
}

function v2IntegrityScore() {
  const penalties = { Critical: 18, High: 9, Medium: 4, Low: 1 };
  return clamp(100 - v2Integrity().reduce((sum, finding) => sum + (penalties[finding.severity] || 2), 0));
}

function v2GraphData() {
  const nodes = [];
  const edges = [];
  const push = (id, label, type, x, y, kind) => nodes.push({ id, label, type, x, y, kind });
  push(book().id, book().title, "book", 50, 10, "book");
  const chapters = rows("chapters").slice(0, 4);
  const characters = rows("characters").slice(0, 4);
  const locations = rows("locations").slice(0, 4);
  const canon = rows("canonFacts").slice(0, 4);
  chapters.forEach((record, index) => { push(record.id, `Ch ${record.n} · ${record.title}`, "chapter", 16 + index * 22, 32, "chapter"); edges.push([book().id, record.id, "contains"]); });
  characters.forEach((record, index) => { push(record.id, record.name, "character", 12 + index * 25, 58, "char"); edges.push([book().id, record.id, "features"]); });
  locations.forEach((record, index) => { push(record.id, record.name, "location", 16 + index * 22, 82, "location"); edges.push([book().id, record.id, "occurs in"]); });
  canon.forEach((record, index) => { push(record.id, record.title, "canon", 20 + index * 20, 96, "canon"); edges.push([book().id, record.id, "governed by"]); });
  rows("scenes").forEach((scene) => {
    if (nodes.some((node) => node.id === scene.chapterId) && nodes.some((node) => node.id === scene.povId)) edges.push([scene.chapterId, scene.povId, "POV"]);
    if (nodes.some((node) => node.id === scene.chapterId) && nodes.some((node) => node.id === scene.locationId)) edges.push([scene.chapterId, scene.locationId, "set at"]);
  });
  rows("relationships").forEach((rel) => {
    if (nodes.some((node) => node.id === rel.sourceId) && nodes.some((node) => node.id === rel.targetId)) edges.push([rel.sourceId, rel.targetId, rel.type]);
  });
  return { nodes, edges };
}

function v2Graph() {
  const data = v2GraphData();
  const filteredTypes = ui.graphMode === "creative" ? new Set(["book", "chapter", "character"]) : ui.graphMode === "canon" ? new Set(["book", "location", "canon"]) : null;
  const nodes = filteredTypes ? data.nodes.filter((node) => filteredTypes.has(node.type)) : data.nodes;
  const nodeIds = new Set(nodes.map((node) => node.id));
  const edges = data.edges.filter(([source, target]) => nodeIds.has(source) && nodeIds.has(target));
  const position = Object.fromEntries(nodes.map((node) => [node.id, node]));
  const findings = v2Integrity();
  return `<div class="page">${header("Publishing knowledge graph", "Story Graph", "See the book as a network of explicit records, references, rules, and dependencies.", `<button class="secondary-button" data-act="integrity">${I.shield}Run integrity</button><button class="primary-button" data-act="snapshot">${I.history}Checkpoint graph</button>`)}
  <div class="graph-layout"><main class="card graph-card"><div class="graph-toolbar"><div class="segmented">${[["all", "All"], ["creative", "Creative"], ["canon", "World + canon"]].map(([id, label]) => `<button class="${ui.graphMode === id ? "active" : ""}" data-act="graph-mode" data-mode="${id}">${label}</button>`).join("")}</div><span>${nodes.length} nodes · ${edges.length} relationships</span></div><div class="graph-canvas"><svg class="graph-lines" viewBox="0 0 100 110" preserveAspectRatio="none">${edges.map(([source, target, label]) => { const a = position[source], b = position[target]; return `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"><title>${esc(label)}</title></line>`; }).join("")}</svg>${nodes.map((node) => `<button class="graph-node ${node.type}" style="left:${node.x}%;top:${node.y}%" data-act="graph-node" data-kind="${node.kind}" data-id="${node.id}"><span class="graph-node-icon">${node.type === "book" ? I.book : node.type === "character" ? I.users : node.type === "chapter" ? I.file : node.type === "location" ? I.globe : I.shield}</span><span class="graph-node-copy"><strong>${esc(node.label)}</strong><small>${node.id}</small></span></button>`).join("")}</div></main><aside class="stack"><div class="card"><div class="card-header"><div class="card-header-copy"><div class="card-title">Graph health</div><div class="card-subtitle">Live knowledge integrity</div></div><div class="integrity-score ${v2IntegrityScore() < 70 ? "danger" : ""}">${v2IntegrityScore()}</div></div><div class="card-body"><div class="risk-list">${findings.slice(0, 6).map((finding) => `<button class="risk-row risk-button" data-act="open-ref" data-id="${finding.refId}"><div class="risk-dot ${["Critical", "High"].includes(finding.severity) ? "high" : ""}"></div><div><div class="risk-title">${esc(finding.title)}</div><div class="risk-meta">${finding.severity}</div></div></button>`).join("") || `<div class="empty-state"><h3>All references resolve</h3><p>The graph has no detected integrity problems.</p></div>`}</div></div></div><div class="card"><div class="card-header"><div class="card-header-copy"><div class="card-title">Impact analysis</div><div class="card-subtitle">Select any node to inspect downstream references</div></div></div><div class="card-body"><p class="muted-copy">Canonical changes no longer disappear into documents. The OS can show which chapters, scenes, issues, tasks, and proposals depend on a record before it changes.</p></div></div></aside></div></div>`;
}

  if (kind === "location") body = v2FieldRows(r, [["Type", "type"], ["Status", "status", badge], ["Description", "description"], ["Government / control", "government"], ["Climate", "climate"], ["Importance", "importance"]]);
  if (kind === "canon") body = v2FieldRows(r, [["Category", "category"], ["Status", "status", badge], ["Statement", "statement"], ["Confidence", "confidence", (v) => `${v}%`], ["Source", "sourceId"], ["Owner", "owner"]]);

function v2CommandResults(query = "") {

function v2ChapterCheck() {
  const chapter = v2SelectedChapter();
  const scenes = rows("scenes").filter((scene) => scene.chapterId === chapter.id);
  const checks = [
    { label: "Purpose defined", ok: Boolean(chapter.purpose) },
    { label: "POV assigned", ok: Boolean(chapter.pov) },
    { label: "At least one scene linked", ok: scenes.length > 0 },
    { label: "Every scene has goal + conflict", ok: scenes.every((scene) => scene.goal && scene.conflict) },
    { label: "Emotional movement defined", ok: Boolean(chapter.emotion) },
    { label: "Draft has meaningful text", ok: v2WordCount(chapter.draft) >= 100 },
  ];
  const pct = Math.round((checks.filter((check) => check.ok).length / checks.length) * 100);
  open("Chapter readiness", `${chapter.id} · ${pct}% ready`, `<div class="check-grid">${checks.map((check) => `<div class="check-row ${check.ok ? "done" : ""}"><span>${check.ok ? I.check : I.alert}</span><strong>${esc(check.label)}</strong><small>${check.ok ? "Verified" : "Needs attention"}</small></div>`).join("")}</div>`, `<button class="primary-button" data-act="close">Done</button>`);
}

function v2Snapshot() {
  const clean = v2Clone(state);
  clean.snapshots = [];
  clean.messages = [];
  const snapshot = { id: "SNAP-" + Date.now(), bookId: book().id, name: `${book().title} · ${current().code} checkpoint`, at: now(), actor: "Mangu Studio", integrity: v2IntegrityScore(), payload: JSON.stringify(clean) };
  state.snapshots.unshift(snapshot);
  state.snapshots = state.snapshots.slice(0, 8);
  v2Emit("snapshot", "Project checkpoint created", `${snapshot.name} · integrity ${snapshot.integrity}`, snapshot.id);
  save(); toast("Checkpoint created", "The entire Book OS state can be restored from Settings."); render();
}

function v2Proposal(id) {
  const proposal = rows("proposals").find((item) => item.id === id);
  if (proposal) details("proposal", proposal.id);
}

function v2ApproveProposal(id) {
  const proposal = state.proposals.find((item) => item.id === id);
  if (!proposal || proposal.status !== "Awaiting approval") return;
  proposal.status = "Approved";
  proposal.approvedAt = now();
  proposal.approvedBy = "Mangu Studio";
  if (proposal.targetId === "CANON-000002") {
    const fact = state.canonFacts.find((item) => item.id === proposal.targetId);
    if (fact) {
      fact.statement = "Residents retain private memories while physically inside an erased boundary. After departure, those memories decay over seven days unless anchored by a forbidden name or object.";
      fact.status = "Approved";
      fact.confidence = 92;
      fact.version += 1;
      fact.updated = now();
    }
    const issue = state.issues.find((item) => item.id === "ISSUE-000004");
    if (issue) issue.status = "Resolved";
    const task = state.tasks.find((item) => item.linkedId === proposal.targetId);
    if (task) task.status = "Done";
  }
  if (proposal.targetId === "ISSUE-000002") {
    const issue = state.issues.find((item) => item.id === proposal.targetId);
    if (issue) issue.status = "Revision";
  }
  v2Emit("approval", `${proposal.title} approved`, `${proposal.agent} · human authorization`, proposal.id);
  state.notifications.unshift({ id: "NOTE-" + Date.now(), bookId: book().id, title: "Agent proposal approved", body: proposal.title, type: "Approval", unread: false, linkedId: proposal.id, at: now() });
  save(); close(); render(); toast("Proposal approved", "Canonical state and downstream work were updated.");
}

function v2AgentRun(agent) {

  const title = agent === "Continuity Guardian" ? "Continuity scan complete" : `${agent} reviewed the active publication`;
  const body = agent === "Continuity Guardian" ? `${findings.length} integrity findings; highest risk is ${findings[0]?.title || "none"}.` : `Shared state loaded: ${rows("chapters").length} chapters, ${rows("scenes").length} scenes, ${rows("canonFacts").length} canon rules, and ${rows("issues").filter((x) => x.status !== "Resolved").length} open editorial issues.`;
  state.messages.push({ author: "agent", text: `<strong>${esc(title)}.</strong> ${esc(body)}` });
  v2Emit("ai", title, agent);
  save(); ui.view = "ai"; location.hash = "ai"; render();
}

function v2OpenRef(id) {
  if (!id || id === "timeline") { ui.view = "world"; ui.worldTab = "timeline"; location.hash = "world"; close(); render(); return; }
  if (/^M\d+$/.test(id)) { ui.view = "lifecycle"; ui.milestone = id; location.hash = "lifecycle"; close(); render(); return; }
  const found = v2Find(id);
  if (found) { close(); setTimeout(() => details(found.kind, id)); }
}

function v2Import(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(String(reader.result || ""));
      if (!incoming || !Array.isArray(incoming.books)) throw new Error("No books array found");
      state = incoming;
      v2Hydrate();
      ui.chapterId = rows("chapters")[0]?.id || "";
      close(); render(); toast("Import complete", "The local Book OS state was replaced successfully.");
    } catch (error) {
      toast("Import failed", error.message || "Invalid JSON state");
    }
  };
  reader.readAsText(file);
}

function v2RestoreSnapshot(id) {
  const snapshot = state.snapshots.find((item) => item.id === id);
  if (!snapshot || !confirm("Restore this checkpoint? Current unsaved state will be replaced.")) return;
  const preserved = state.snapshots;
  state = JSON.parse(snapshot.payload);
  state.snapshots = preserved;
  v2Hydrate();
  close(); render(); toast("Checkpoint restored", snapshot.name);
}

  else if (action === "new-timeline") { close(); setTimeout(v2NewTimeline); }

  else if (action === "graph-mode") { ui.graphMode = el.dataset.mode; render(); }
  else if (action === "outline-mode") { ui.outline = el.dataset.mode; render(); }
  else if (action === "scene") details("scene", el.dataset.id);
  else if (action === "location") details("location", el.dataset.id);
  else if (action === "canon") details("canon", el.dataset.id);
  else if (action === "timeline") details("timeline", el.dataset.id);
  else if (action === "relationship") details("relationship", el.dataset.id);
  else if (action === "task") details("task", el.dataset.id);
  else if (action === "proposal") v2Proposal(el.dataset.id);
  else if (action === "graph-node") details(el.dataset.kind, el.dataset.id);
  else if (action === "open-ref") v2OpenRef(el.dataset.id);
  else if (action === "open-studio") { ui.chapterId = el.dataset.id; ui.view = "studio"; location.hash = "studio"; close(); render(); }
  else if (action === "notifications") v2Notifications();
  else if (action === "mark-read") { rows("notifications").forEach((note) => (note.unread = false)); save(); close(); render(); }
  else if (action === "notification") { const note = state.notifications.find((item) => item.id === el.dataset.id); if (note) note.unread = false; save(); v2OpenRef(el.dataset.linked); }
  else if (action === "integrity") v2IntegrityModal();
  else if (action === "chapter-check") v2ChapterCheck();
  else if (action === "save-revision") v2SaveRevision();
  else if (action === "snapshot") { close(); setTimeout(v2Snapshot); }
  else if (action === "approve-proposal") v2ApproveProposal(el.dataset.id);
  else if (action === "approve-canon") { const fact = state.canonFacts.find((item) => item.id === el.dataset.id); if (fact) { fact.status = "Approved"; fact.confidence = Math.max(90, fact.confidence); fact.updated = now(); fact.version += 1; v2Emit("approval", `${fact.title} approved as canon`, "Mangu Studio", fact.id); save(); close(); render(); toast("Canon approved", fact.id); } }
  else if (action === "agent-run") v2AgentRun(el.dataset.agent);
  else if (action === "command-record") { close(); if (el.dataset.view === "studio" && el.dataset.kind === "chapter") { ui.chapterId = el.dataset.id; ui.view = "studio"; location.hash = "studio"; render(); } else setTimeout(() => details(el.dataset.kind, el.dataset.id)); }
  else if (action === "restore-snapshot") v2RestoreSnapshot(el.dataset.id);
  else if (action === "reset") setTimeout(() => { v2Hydrate(); ui.chapterId = rows("chapters")[0]?.id || ""; render(); }, 30);
}, true);

let v2DraftTimer;
document.addEventListener("input", (event) => {
  const target = event.target;
  if (target.id === "command-search") {
    const results = $("#command-results");
    if (results) results.innerHTML = v2CommandResults(target.value);
  }
  if (target.id === "manuscript-editor") {
    const chapter = state.chapters.find((item) => item.id === target.dataset.id);
    if (!chapter) return;
    chapter.draft = target.value;
    chapter.draftWordCount = v2WordCount(target.value);
    chapter.words = chapter.draftWordCount;
    chapter.draftMode = "full";
    chapter.updated = now();
    v2RecalculateWords();
    const live = $("#live-word-count");
    if (live) live.textContent = `${chapter.words.toLocaleString()} words`;
    clearTimeout(v2DraftTimer);
    v2DraftTimer = setTimeout(() => save(), 250);
  }
});

document.addEventListener("change", (event) => {
  const target = event.target;
  if (target.dataset.chapterTitle) {
    const chapter = state.chapters.find((item) => item.id === target.dataset.chapterTitle);
    if (chapter) { chapter.title = target.value.trim() || chapter.title; chapter.updated = now(); chapter.version += 1; v2Emit("edit", `${chapter.id} title updated`, "Mangu Studio", chapter.id); save(); render(); }
  }
  if (target.dataset.chapterStatus) {
    const chapter = state.chapters.find((item) => item.id === target.dataset.chapterStatus);
    if (chapter) { chapter.status = target.value; chapter.updated = now(); v2Emit("workflow", `${chapter.title} moved to ${target.value}`, "Mangu Studio", chapter.id); save(); render(); }
  }
  if (target.dataset.taskStatus) {
    const task = state.tasks.find((item) => item.id === target.dataset.taskStatus);
    if (task) { task.status = target.value; task.updated = now(); v2Emit("workflow", `${task.title} moved to ${target.value}`, "Mangu Studio", task.id); save(); close(); render(); toast("Work item updated", `${task.id} → ${task.status}`); }
  }
  if (target.id === "import-state") v2Import(target.files?.[0]);
});

window.addEventListener("beforeunload", () => save());
render();
</script></body></html>
